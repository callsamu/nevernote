<main class="main p-8">
  @if (editorOpen()) {
    <nevernote-note-view
      [note]="selectedNote()"
    />
  }


  <div class="flex flex-col">
    @for (note of notes(); track note.id) {
      <div (click)="select(note)" class="card w-96">
        <h3>{{ note.title }}</h3>
        <div [innerHTML]="note.content | safeHTML" class="prose prose-sm"></div>
      </div>
    }
  </div>


</main>

<router-outlet />
