<!-- main screen -->
<main class="flex h-screen bg-base-100 overflow-hidden">

  <!-- ── Note list sidebar ──────────────────────────────────────────────── -->
  <aside class="flex flex-col w-80 shrink-0
                border-r border-base-300 bg-base-200
                overflow-y-auto">

    <!-- Sidebar header -->
    <div class="sticky top-0 z-10
                px-4 py-3
                bg-base-200 border-b border-base-300
                flex items-center justify-between">
      <h2 class="text-xs font-semibold uppercase tracking-widest
                 text-base-content/40">
        Notes
      </h2>
      <button
        type="button"
        class="btn btn-primary btn-xs gap-1"
        (click)="onCapture()"
        title="New note"
      >
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New
      </button>
    </div>

    <!-- Note cards -->
    <ul class="flex flex-col gap-px p-2">
      @for (note of notes(); track note.id) {
        <li>
          <button
            type="button"
            (click)="select(note)"
            class="w-full text-left px-3 py-3 rounded-lg
                   transition-colors duration-150 cursor-pointer
                   hover:bg-base-300 active:scale-[.99]"
            [class.bg-primary!]="selectedNote()?.id === note.id"
            [class.text-primary-content!]="selectedNote()?.id === note.id"
            [class.hover:bg-primary!]="selectedNote()?.id === note.id"
          >
            <h3 class="text-sm font-semibold leading-snug truncate">
              {{ note.title || 'Untitled' }}
            </h3>
            <div
              class="text-xs mt-0.5 line-clamp-2 opacity-50 leading-relaxed
                     [&_*]:inline [&_*]:text-inherit [&_br]:hidden"
              [innerHTML]="note.content | safeHTML"
            ></div>
            <span class="text-xs opacity-30 mt-1.5 block tabular-nums">
              {{ note.modifyDate | date:'MMM d, y' }}
            </span>
          </button>
        </li>
      }
    </ul>

  </aside>

  <!-- ── Editor / empty state ───────────────────────────────────────────── -->
  <section class="flex-1 overflow-y-auto">
    @if (editorOpen()) {
      <nevernote-note-view
        [note]="selectedNote()"
        (noteSaved)="onNoteSaved($event)"
      />
    } @else {
      <div class="flex flex-col items-center justify-center
                  h-full gap-3 text-base-content/25 select-none">
        <svg class="w-12 h-12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <p class="text-sm">Select a note to get started</p>
        <button
          type="button"
          class="btn btn-primary btn-sm gap-1.5 mt-1"
          (click)="onCapture()"
        >
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New note
        </button>
      </div>
    }
  </section>

</main>
