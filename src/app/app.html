<div class="flex h-screen w-screen bg-base-100 overflow-hidden font-sans">
  @if (layout.isDesktop()) {
    <nevernote-note-sidebar
      class="hidden lg:flex"
      [notebooks]="notebookStore.contents()"
      [selectedNotebook]="notebookStore.selected()"
      (createClicked)="newNotebookModalOpen.set(true)"
      (deleteClicked)="notebookToDelete.set($event)"
    />
  }
  <div class="flex flex-1 overflow-hidden">
    <router-outlet />
  </div>

</div>

@if (layout.drawerOpen() && !layout.isDesktop()) {
  <div class="fixed inset-0 z-40 flex lg:hidden">
    <div class="absolute inset-0 bg-base-content/30 backdrop-blur-sm"
         (click)="layout.closeDrawer()">
    </div>
    <div class="relative z-50 w-64 h-full flex flex-col
                bg-base-200 border-r border-base-300 shadow-xl">
      <div class="flex items-center justify-between
                  px-3 py-3 border-b border-base-300 shrink-0">
        <span class="text-xs font-semibold text-base-content/50
                     uppercase tracking-widest">Menu</span>
        <button type="button"
                class="btn btn-ghost btn-xs btn-square"
                (click)="layout.closeDrawer()">
          <ng-icon name="heroXMark" class="text-base" />
        </button>
      </div>
      <nevernote-note-sidebar
        class="flex flex-1 overflow-hidden"
        [notebooks]="notebookStore.contents()"
        [selectedNotebook]="notebookStore.selected()"
        (createClicked)="newNotebookModalOpen.set(true);"
        (deleteClicked)="notebookToDelete.set($event)"
      />
    </div>
  </div>
}

<nevernote-notebook-create-modal
  [open]="newNotebookModalOpen()"
  (confirmed)="onCreateNotebook($event)"
  (dismissed)="newNotebookModalOpen.set(false)"
/>

<nevernote-notebook-delete-modal
  [notebook]="notebookToDelete()"
  (confirmed)="onDeleteNotebook($event); notebookToDelete.set(null)"
  (dismissed)="notebookToDelete.set(null)"
/>
