<aside class="h-full flex flex-col bg-base-100 overflow-hidden w-full sm:w-80">

  <div class="flex items-center gap-2 px-3 py-2
              bg-base-100 border-b border-base-300 shrink-0">

    <button type="button"
            class="btn btn-ghost btn-xs btn-square lg:hidden"
            title="Menu"
            (click)="menuClicked.emit()">
      <ng-icon name="heroBars3" class="text-base" />
    </button>

    <span class="text-xs text-base-content/40 font-medium flex-1 truncate">
      {{ title() }}
    </span>

    <button type="button"
            class="btn btn-ghost btn-xs btn-square opacity-30"
            disabled
            title="Toggle view (coming soon)">
      <ng-icon name="heroSquares2X2" class="text-base" />
    </button>

    <button type="button"
            class="btn btn-primary btn-xs gap-1"
            (click)="newNote.emit()"
            title="New note">
      <ng-icon name="heroPlus" class="text-sm" />
      New
    </button>
  </div>

  <div class="px-3 py-2 border-b border-base-300 shrink-0">
    <label class="input input-sm input-bordered flex items-center gap-2 w-full">
      <ng-icon name="heroMagnifyingGlass"
               class="text-base text-base-content/30 shrink-0" />
      <input type="text"
             class="grow text-xs bg-transparent outline-none"
             placeholder="Search notes…" />
    </label>
  </div>

  <ul class="flex-1 overflow-y-auto divide-y divide-base-200">
    @for (note of notes(); track note.id) {
      <li class="group/note relative">
        <button
          type="button"
          (click)="noteSelected.emit(note)"
          class="w-full text-left px-4 py-3 pr-10 transition-colors duration-100
                 hover:bg-base-200 active:bg-base-300"
          [class.bg-primary!]="selectedNote()?.id === note.id"
          [class.text-primary-content!]="selectedNote()?.id === note.id"
          [class.hover:bg-primary!]="selectedNote()?.id === note.id"
        >
          <h3 class="text-sm font-semibold leading-snug truncate">
            {{ note.title || 'Untitled' }}
          </h3>
          <p class="text-xs mt-0.5 line-clamp-2 leading-relaxed opacity-50">
            <span class="font-medium tabular-nums">
              {{ note.updatedAt | date:'M/d/yyyy' }}
            </span>
            <span class="mx-1 opacity-40">·</span>
            <span [innerHTML]="note.content | safeHTML"></span>
          </p>
        </button>

        <button
          type="button"
          class="absolute right-2 top-1/2 -translate-y-1/2
                 opacity-0 group-hover/note:opacity-40 hover:!opacity-100
                 transition-opacity duration-100
                 btn btn-ghost btn-xs btn-square"
          [title]="note.trashed ? 'Restore note' : 'Trash note'"
          (click)="$event.stopPropagation(); onTrashToggle(note)">
          <ng-icon [name]="note.trashed ? 'heroArrowUturnLeft' : 'heroTrash'" class="text-sm" />
        </button>
      </li>
    }

    @empty {
      <li class="flex flex-col items-center justify-center
                 gap-2 py-16 text-base-content/25 select-none">
        <ng-icon name="heroDocumentText" class="text-4xl" />
        <span class="text-xs">No notes</span>
        <button type="button"
                class="btn btn-primary btn-xs gap-1 mt-1"
                (click)="newNote.emit()">
          <ng-icon name="heroPlus" class="text-sm" />
          New note
        </button>
      </li>
    }

  </ul>
</aside>
